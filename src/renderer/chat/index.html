<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyrene Agent Replica Lab</title>
    <script type="module" src="./main.ts"></script>
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <h1>Cyrene Agent</h1>
            <p>Replica Lab</p>
          </div>
          <div class="topbar-actions">
            <nav class="view-switch" aria-label="Primary views">
              <button id="chat-view-button" class="view-switch-button is-active" type="button" aria-pressed="true">Chat</button>
              <button id="memory-view-button" class="view-switch-button" type="button" aria-pressed="false">Memory</button>
              <button id="skills-view-button" class="view-switch-button" type="button" aria-pressed="false">Skills</button>
              <button id="mcp-view-button" class="view-switch-button" type="button" aria-pressed="false">MCP</button>
              <button id="scheduler-view-button" class="view-switch-button" type="button" aria-pressed="false">Tasks</button>
            </nav>
            <label class="style-control" for="style-select">
              <span>Style</span>
              <select id="style-select" aria-label="Reply style"></select>
            </label>
            <button id="new-chat-button" class="secondary-button" type="button">New Chat</button>
            <span id="status" class="status">Ready</span>
          </div>
        </header>

        <section id="chat-view" class="chat-pane" aria-label="Chat">
          <aside id="conversation-sidebar" class="conversation-sidebar" aria-label="Conversations"></aside>
          <section class="conversation-chat">
            <div id="messages" class="messages"></div>

            <form id="chat-form" class="composer">
              <input id="message-input" type="text" autocomplete="off" placeholder="Type a message..." />
              <button id="stop-button" class="stop-button" type="button" title="Stop response" aria-label="Stop response" hidden>■</button>
              <button type="submit">Send</button>
            </form>
          </section>
        </section>

        <section id="memory-view" class="memory-view" aria-label="Memory" hidden></section>
        <section id="skills-view" class="skills-view" aria-label="Skills" hidden></section>
        <section id="mcp-view" class="mcp-view" aria-label="MCP Servers" hidden></section>
        <section id="scheduler-view" class="scheduler-view" aria-label="Scheduled Tasks" hidden></section>
      </section>

      <aside class="event-pane" aria-label="Agent events">
        <h2>Agent Events</h2>
        <ol id="events" class="events"></ol>
      </aside>
    </main>
    <div id="mcp-approval-root" class="mcp-approval-overlay" hidden></div>
  </body>
</html>
