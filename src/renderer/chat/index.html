<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyrene Agent Replica Lab</title>
    <script type="module" src="./main.ts"></script>
  </head>
  <body>
    <main class="shell">
      <section class="chat-pane" aria-label="Chat">
        <header class="topbar">
          <div>
            <h1>Cyrene Agent</h1>
            <p>Replica Lab</p>
          </div>
          <div class="topbar-actions">
            <label class="style-control" for="style-select">
              <span>风格</span>
              <select id="style-select" aria-label="回复风格"></select>
            </label>
            <button id="new-chat-button" class="secondary-button" type="button">New Chat</button>
            <span id="status" class="status">Ready</span>
          </div>
        </header>

        <div id="messages" class="messages"></div>

        <form id="chat-form" class="composer">
          <input id="message-input" type="text" autocomplete="off" placeholder="输入一句话..." />
          <button type="submit">Send</button>
        </form>
      </section>

      <aside class="event-pane" aria-label="Agent events">
        <h2>Agent Events</h2>
        <ol id="events" class="events"></ol>
      </aside>
    </main>
  </body>
</html>
