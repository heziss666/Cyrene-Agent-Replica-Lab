<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyrene Agent Replica Lab</title>
    <script type="module" src="./main.ts"></script>
  </head>
  <body>
    <main class="shell">
      <aside class="app-sidebar">
        <div class="brand"><span class="brand-mark">C</span><span class="brand-copy">Cyrene Agent<small>Replica Lab</small></span></div>
        <nav class="view-switch" aria-label="Primary views">
          <button id="chat-view-button" class="view-switch-button is-active" type="button" aria-pressed="true" aria-current="page"><span class="nav-icon">C</span><span class="nav-label">Chat</span></button>
          <button id="currency-war-view-button" class="view-switch-button" type="button" aria-pressed="false"><span class="nav-icon">G</span><span class="nav-label">对局</span></button>
          <button id="memory-view-button" class="view-switch-button" type="button" aria-pressed="false"><span class="nav-icon">M</span><span class="nav-label">Memory</span></button>
          <button id="skills-view-button" class="view-switch-button" type="button" aria-pressed="false"><span class="nav-icon">S</span><span class="nav-label">Skills</span></button>
          <button id="mcp-view-button" class="view-switch-button" type="button" aria-pressed="false"><span class="nav-icon">P</span><span class="nav-label">MCP</span></button>
          <button id="scheduler-view-button" class="view-switch-button" type="button" aria-pressed="false"><span class="nav-icon">T</span><span class="nav-label">Tasks</span></button>
          <button id="runs-view-button" class="view-switch-button" type="button" aria-pressed="false"><span class="nav-icon">R</span><span class="nav-label">Runs</span></button>
        </nav>
        <div class="sidebar-footer"><span class="connection-dot"></span><span class="nav-label">Runtime ready</span></div>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div class="page-heading"><h1 id="page-title">Chat</h1><p id="page-description">Conversation workspace</p></div>
          <div class="topbar-actions">
            <label class="style-control" for="style-select"><span>Style</span><select id="style-select" aria-label="Reply style"></select></label>
            <button id="new-chat-button" class="secondary-button" type="button">New Chat</button>
            <span id="status" class="status">Ready</span>
            <button id="activity-toggle" class="icon-button activity-toggle" type="button" aria-controls="activity-drawer" aria-expanded="false" title="Open activity" aria-label="Open activity">Activity</button>
          </div>
        </header>

        <section id="chat-view" class="chat-pane" aria-label="Chat">
          <aside id="conversation-sidebar" class="conversation-sidebar" aria-label="Conversations"></aside>
          <section class="conversation-chat">
            <div id="messages" class="messages"></div>
            <form id="chat-form" class="composer">
              <input id="message-input" type="text" autocomplete="off" placeholder="Message Cyrene..." />
              <button id="stop-button" class="stop-button" type="button" title="Stop response" aria-label="Stop response" hidden>Stop</button>
              <button type="submit">Send</button>
            </form>
          </section>
        </section>

        <section id="memory-view" class="memory-view" aria-label="Memory" hidden></section>
        <section id="currency-war-view" class="currency-war-view" aria-label="货币战争对局" hidden></section>
        <section id="skills-view" class="skills-view" aria-label="Skills" hidden></section>
        <section id="mcp-view" class="mcp-view" aria-label="MCP Servers" hidden></section>
        <section id="scheduler-view" class="scheduler-view" aria-label="Scheduled Tasks" hidden></section>
        <section id="runs-view" class="runs-view" aria-label="Agent Runs" hidden></section>
      </section>

      <aside id="activity-drawer" class="activity-drawer" aria-hidden="true" hidden>
        <header class="activity-header"><div><h2>Activity</h2><p>Agent execution events</p></div><button id="activity-close" class="icon-button" type="button" title="Close activity" aria-label="Close activity">Close</button></header>
        <ol id="events" class="events"></ol>
      </aside>
    </main>
    <div id="mcp-approval-root" class="mcp-approval-overlay" hidden></div>
  </body>
</html>
